<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank you</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <img class="logo" src="logo.png" alt="Plata Empresa">
      <div class="header-top">
        <h1 data-i18n="success.title">Thank you!</h1>
        <div class="lang-toggle" role="group" aria-label="Language">
          <button type="button" data-lang="es">ES</button>
          <button type="button" data-lang="en">EN</button>
        </div>
      </div>
    </header>

    <div class="success-screen">
      <div class="success-check" aria-hidden="true">
        <svg viewBox="0 0 52 52" width="72" height="72">
          <circle cx="26" cy="26" r="25" fill="none" stroke="#2e7d32" stroke-width="2"></circle>
          <path fill="none" stroke="#2e7d32" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" d="M14 27 l8 8 l16 -18"></path>
        </svg>
      </div>
      <p class="success-message" data-i18n="success.message">Your information has been submitted successfully.</p>
    </div>
  </div>
  <script src="i18n.js"></script>
</body>
</html>
